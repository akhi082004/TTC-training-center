</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">TTC</a>
    <div>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

<div class="container mt-5">
    <h2>Contact Us</h2>

    <form onsubmit="return validateForm()">
        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Mobile Number</label>
            <input type="text" id="mobile" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
    </form>

    <h4 class="mt-4">Contact Information</h4>
    <p>Address: TTC Training Center</p>
    <p>Email: info@ttc.com</p>
    <p>Phone: 01234567890</p>

    <!-- Google Map -->
    <iframe src="https://maps.google.com/maps?q=dhaka&t=&z=13&ie=UTF8&iwloc=&output=embed"
            width="100%" height="300"></iframe>
</div>

<script src="js/script.js"></script>
</body>
</html>
